<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Road Track - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0F2027; background: linear-gradient(to right, #2C5364, #203A43, #0F2027); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center p-6">
    <div class="glass w-full max-w-md p-8 rounded-3xl shadow-2xl text-white">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold mb-2 text-cyan-400">FRT</h1>
            <p class="text-gray-400 text-sm">Secure Family Connectivity Hub</p>
        </div>

        <div id="login-form">
            <div class="mb-6">
                <label class="block text-sm font-semibold mb-2 text-gray-300">Mobile Number</label>
                <input type="text" id="login-mobile" placeholder="077xxxxxxx" class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white outline-none focus:border-cyan-400 transition-all">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-semibold mb-2 text-gray-300">Password</label>
                <input type="password" id="login-password" placeholder="••••••••" class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white outline-none focus:border-cyan-400 transition-all">
            </div>
            
            <button id="btn-login" class="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-cyan-500/20 mb-4 h-12 flex items-center justify-center">
                <span id="login-text">Login</span>
                <div id="login-loader" class="hidden animate-spin rounded-full h-5 w-5 border-2 border-white/30 border-t-white"></div>
            </button>

            <div class="text-center">
                <p class="text-gray-400 text-sm">Don't have an account? <a href="register.html" class="text-cyan-400 hover:underline font-semibold">Register here</a></p>
            </div>
        </div>

        <div id="error-toast" class="hidden mt-4 p-3 bg-red-500/20 border border-red-500 text-red-200 text-xs rounded-lg text-center"></div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Firebase Configuration - SAME AS YOUR MOBILE APP
        const firebaseConfig = {
            // PLEASE REPLACE WITH YOUR ACTUAL FIREBASE CONFIG
            apiKey: "REPLACE_ME",
            authDomain: "REPLACE_ME",
            projectId: "REPLACE_ME",
            storageBucket: "REPLACE_ME",
            messagingSenderId: "REPLACE_ME",
            appId: "REPLACE_ME"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // UI Logic
        const btnLogin = document.getElementById('btn-login');
        const errorToast = document.getElementById('error-toast');

        btnLogin.onclick = async () => {
            const mobile = document.getElementById('login-mobile').value;
            const password = document.getElementById('login-password').value;

            if (!mobile || !password) return showErr("Please enter all fields");

            toggleLoad(true);

            // Admin Shortcut (Same as App)
            if (mobile === '0771246939' && password === 'Admin123@j') {
                localStorage.setItem('isAdmin', 'true');
                window.location.href = 'admin.html';
                return;
            }

            try {
                // Anonymous auth just to access Firestore if security rules require it
                await signInAnonymously(auth);

                const userDoc = await getDoc(doc(db, "users", mobile));
                
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    if (data.password === password) {
                        localStorage.setItem('userId', mobile);
                        localStorage.setItem('isAdmin', 'false');
                        window.location.href = 'dashboard.html';
                    } else {
                        showErr("Incorrect password");
                    }
                } else {
                    showErr("User not found");
                }
            } catch (e) {
                showErr("Error connecting to server");
                console.error(e);
            } finally {
                toggleLoad(false);
            }
        };

        function showErr(msg) {
            errorToast.innerText = msg;
            errorToast.classList.remove('hidden');
            setTimeout(() => errorToast.classList.add('hidden'), 3000);
        }

        function toggleLoad(isLoading) {
            document.getElementById('login-text').classList.toggle('hidden', isLoading);
            document.getElementById('login-loader').classList.toggle('hidden', !isLoading);
            btnLogin.disabled = isLoading;
        }
    </script>
</body>
</html>
