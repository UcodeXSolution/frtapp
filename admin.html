<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRT - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b1120; color: white; min-height: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 1.5rem; transition: all 0.3s ease; }
        .tab-active { background: rgba(34, 211, 238, 0.1); border-color: #22d3ee; color: #22d3ee; }
    </style>
</head>
<body class="p-4 md:p-8">
    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-10">
        <div>
            <h1 class="text-2xl font-bold text-cyan-400">FRT Admin</h1>
            <p class="text-xs text-slate-400 uppercase tracking-widest">Central Safety Hub</p>
        </div>
        <button onclick="logout()" class="bg-red-500/10 hover:bg-red-500/20 text-red-400 px-5 py-2 rounded-xl text-sm font-bold border border-red-500/20 transition-all">Sign Out</button>
    </nav>

    <div class="max-w-7xl mx-auto space-y-8">
        <!-- Stats Summary -->
        <div id="stats-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="card p-6 flex items-center space-x-4">
                <div class="p-4 bg-blue-500/10 rounded-2xl text-blue-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg></div>
                <div><p class="text-xs text-slate-400">Total Users</p><p id="stat-total" class="text-2xl font-bold">--</p></div>
            </div>
            <div class="card p-6 flex items-center space-x-4">
                <div class="p-4 bg-green-500/10 rounded-2xl text-green-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
                <div><p class="text-xs text-slate-400">Active Subs</p><p id="stat-active" class="text-2xl font-bold">--</p></div>
            </div>
            <div class="card p-6 flex items-center space-x-4">
                <div class="p-4 bg-orange-500/10 rounded-2xl text-orange-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
                <div><p class="text-xs text-slate-400">Pending</p><p id="stat-pending" class="text-2xl font-bold">--</p></div>
            </div>
            <div class="card p-6 flex items-center space-x-4">
                <div class="p-4 bg-purple-500/10 rounded-2xl text-purple-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M12 16c1.11 0 2.08-.402 2.599-1"/></svg></div>
                <div><p class="text-xs text-slate-400">Revenue</p><p id="stat-revenue" class="text-2xl font-bold">LKR 0</p></div>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="flex space-x-2 border-b border-slate-800 pb-px overflow-x-auto">
            <button onclick="showTab('approvals')" id="tab-approvals" class="px-6 py-3 font-semibold text-slate-400 transition-all border-b-2 border-transparent">Pending Approvals</button>
            <button onclick="showTab('cancellations')" id="tab-cancellations" class="px-6 py-3 font-semibold text-slate-400 transition-all border-b-2 border-transparent">Churn Log</button>
            <button onclick="showTab('bank')" id="tab-bank" class="px-6 py-3 font-semibold text-slate-400 transition-all border-b-2 border-transparent">Bank Config</button>
        </div>

        <!-- Tab Content -->
        <div id="content-approvals" class="tab-content">
            <div id="approvals-list" class="space-y-4">
                <!-- Approval cards will be injected here -->
                <div class="text-center py-20 text-slate-500">Loading pending requests...</div>
            </div>
        </div>

        <div id="content-cancellations" class="tab-content hidden">
            <div id="cancellations-list" class="space-y-4">
                <div class="text-center py-20 text-slate-500">No cancellations recorded.</div>
            </div>
        </div>

        <div id="content-bank" class="tab-content hidden">
            <div class="card p-8 max-w-2xl">
                <h3 class="text-xl font-bold mb-6">User-Facing Bank Details</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2">ACCOUNT NAME</label>
                        <input type="text" id="bank-name" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 outline-none focus:border-cyan-400">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2">BANK & BRANCH</label>
                        <input type="text" id="bank-info" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 outline-none focus:border-cyan-400">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2">ACCOUNT NUMBER</label>
                        <input type="text" id="bank-acc" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 outline-none focus:border-cyan-400">
                    </div>
                    <button onclick="saveBank()" class="w-full bg-cyan-500 hover:bg-cyan-600 text-black font-bold py-3 mt-4 rounded-xl transition-all">Update Settings</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Review Modal -->
    <div id="review-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-6 hidden z-50 overflow-y-auto">
        <div class="glass w-full max-w-2xl rounded-3xl p-8 relative my-10">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, updateDoc, setDoc, serverTimestamp, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Security check
        if (localStorage.getItem('isAdmin') !== 'true') window.location.href = 'index.html';

        const firebaseConfig = {
            apiKey: "AIzaSyCmtV4tRTpCCgFZIVxGsW2lLiExZsTIOR4",
            authDomain: "frtapp-ff79b.firebaseapp.com",
            projectId: "frtapp-ff79b",
            storageBucket: "frtapp-ff79b.firebasestorage.app",
            messagingSenderId: "1060214465512",
            appId: "1:1060214465512:web:your_web_app_id_here"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Stats Logic ---
        onSnapshot(collection(db, "users"), (snap) => {
            const allUsers = snap.docs.map(d => d.data());
            const total = allUsers.length;
            const active = allUsers.filter(u => u.subscriptionExpiry && u.subscriptionExpiry.toDate() > new Date()).length;
            const pending = allUsers.filter(u => u.paymentStatus === 'pending').length;
            
            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-active').innerText = active;
            document.getElementById('stat-pending').innerText = pending;
            document.getElementById('stat-revenue').innerText = `LKR ${active * 350}`;
        });

        // --- Approvals Logic ---
        const qApprovals = query(collection(db, "users"), where("paymentStatus", "==", "pending"));
        onSnapshot(qApprovals, (snap) => {
            const list = document.getElementById('approvals-list');
            if (snap.empty) {
                list.innerHTML = `<div class="text-center py-20 text-slate-500">No pending approvals found.</div>`;
                return;
            }
            list.innerHTML = snap.docs.map(d => {
                const u = d.data();
                return `
                <div class="card p-5 flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div class="flex items-center space-x-4">
                        <img src="${u.profilePicture || 'https://via.placeholder.com/100'}" class="w-12 h-12 rounded-full border border-slate-700">
                        <div>
                            <h4 class="font-bold">${u.name}</h4>
                            <p class="text-xs text-slate-400">${u.mobile}</p>
                        </div>
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="reviewUser('${d.id}')" class="bg-cyan-500/10 hover:bg-cyan-500/20 text-cyan-400 px-4 py-2 rounded-xl text-xs font-bold border border-cyan-500/20">Review Receipt</button>
                    </div>
                </div>`;
            }).join('');
        });

        // --- Review Modal Logic ---
        window.reviewUser = async (id) => {
            const u = (await getDoc(doc(db, "users", id))).data();
            const modalBody = document.getElementById('modal-body');
            modalBody.innerHTML = `
                <div class="text-center">
                    <img src="${u.profilePicture}" class="w-20 h-20 rounded-full mx-auto mb-4 border-2 border-cyan-400/20">
                    <h3 class="text-xl font-bold">${u.name}</h3>
                    <p class="text-slate-400 text-sm mb-6">${id}</p>
                </div>
                <div class="bg-slate-900 rounded-2xl p-4 mb-6 border border-slate-800">
                    <p class="text-[10px] font-bold text-cyan-400 mb-3 tracking-widest text-center uppercase">Payment Verification Slip</p>
                    <img src="${u.paymentSlipUrl}" class="w-full max-h-[400px] object-contain rounded-lg">
                </div>
                <div class="flex space-x-4">
                    <button onclick="handleApproval('${id}', false)" class="flex-1 border border-red-500/30 text-red-400 font-bold py-4 rounded-2xl hover:bg-red-500/10 transition-all">Reject</button>
                    <button onclick="handleApproval('${id}', true)" class="flex-1 bg-green-500 hover:bg-green-600 text-black font-bold py-4 rounded-2xl transition-all">Approve Account</button>
                </div>
            `;
            document.getElementById('review-modal').classList.remove('hidden');
        };

        window.handleApproval = async (id, approved) => {
            closeModal();
            try {
                if (approved) {
                    const expiry = new Date();
                    expiry.setDate(expiry.getDate() + 30);
                    // Promo logic 
                    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
                    let promo = '';
                    for(let i=0; i<6; i++) promo += chars[Math.floor(Math.random() * chars.length)];

                    await updateDoc(doc(db, "users", id), {
                        isAppUnlocked: true,
                        paymentStatus: 'approved',
                        subscriptionExpiry: expiry,
                        promoCode: promo,
                        isFirstLoginAfterApprove: true
                    });
                    alert("User approved successfully!");
                } else {
                    await updateDoc(doc(db, "users", id), { paymentStatus: 'rejected' });
                    alert("User rejected.");
                }
            } catch(e) { alert("Error updating status"); }
        };

        // --- Churn Logic ---
        onSnapshot(query(collection(db, "cancellations"), orderBy("timestamp", "desc")), (snap) => {
            const list = document.getElementById('cancellations-list');
            if (snap.empty) return;
            list.innerHTML = snap.docs.map(d => {
                const c = d.data();
                return `
                <div class="card p-6 border-l-4 border-red-500/50">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h4 class="font-bold text-lg">${c.email}</h4>
                            <p class="text-xs text-slate-500">${c.timestamp?.toDate().toLocaleDateString()}</p>
                        </div>
                        <span class="bg-red-500/10 text-red-400 text-[10px] font-bold px-2 py-1 rounded border border-red-500/20 uppercase tracking-widest">${c.reason}</span>
                    </div>
                    <p class="text-slate-400 text-sm italic">"${c.feedback || 'No comments'}"</p>
                </div>`;
            }).join('');
        });

        // --- Bank Config Logic ---
        const bankDoc = await getDoc(doc(db, "settings", "bankDetails"));
        if(bankDoc.exists()) {
            const b = bankDoc.data();
            document.getElementById('bank-name').value = b.name || '';
            document.getElementById('bank-info').value = b.bank || '';
            document.getElementById('bank-acc').value = b.accountNumber || '';
        }

        window.saveBank = async () => {
            await setDoc(doc(db, "settings", "bankDetails"), {
                name: document.getElementById('bank-name').value,
                bank: document.getElementById('bank-info').value,
                accountNumber: document.getElementById('bank-acc').value,
                updatedAt: serverTimestamp()
            });
            alert("Bank details updated!");
        };

        // --- Global Helpers ---
        window.logout = () => { localStorage.clear(); window.location.href = 'index.html'; };
        window.closeModal = () => document.getElementById('review-modal').classList.add('hidden');
        window.showTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`content-${tab}`).classList.remove('hidden');
            document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.remove('tab-active'));
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
        };
        showTab('approvals');
    </script>
</body>
</html>
