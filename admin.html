<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRT - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b1120; color: white; min-height: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 1.5rem; }
        .tab-active { background: rgba(34, 211, 238, 0.1); border-color: #22d3ee; color: #22d3ee; }
    </style>
</head>
<body class="p-4 md:p-8">
    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-10">
        <div>
            <h1 class="text-2xl font-bold text-cyan-400">FRT Admin</h1>
        </div>
        <button onclick="logout()" class="text-red-400 text-sm font-bold">Sign Out</button>
    </nav>

    <div class="max-w-7xl mx-auto space-y-8">
        <div id="stats-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="card p-6">
                <p class="text-xs text-slate-400">Total Users</p>
                <p id="stat-total" class="text-2xl font-bold">--</p>
            </div>
            <div class="card p-6">
                <p class="text-xs text-slate-400">Active Subs</p>
                <p id="stat-active" class="text-2xl font-bold">--</p>
            </div>
            <div class="card p-6">
                <p class="text-xs text-slate-400">Pending</p>
                <p id="stat-pending" class="text-2xl font-bold">--</p>
            </div>
            <div class="card p-6">
                <p class="text-xs text-slate-400">Revenue</p>
                <p id="stat-revenue" class="text-2xl font-bold">LKR 0</p>
            </div>
        </div>

        <div class="flex space-x-2 border-b border-slate-800 pb-px overflow-x-auto">
            <button onclick="showTab('approvals')" id="tab-approvals" class="px-6 py-3 font-semibold text-slate-400">Pending</button>
            <button onclick="showTab('cancellations')" id="tab-cancellations" class="px-6 py-3 font-semibold text-slate-400">Cancellations</button>
            <button onclick="showTab('bank')" id="tab-bank" class="px-6 py-3 font-semibold text-slate-400">Bank Details</button>
        </div>

        <div id="content-approvals" class="tab-content transition-all">
            <div id="approvals-list" class="space-y-4">
                <div class="text-center py-20 text-slate-500">Loading requests...</div>
            </div>
        </div>

        <div id="content-cancellations" class="tab-content hidden">
            <div id="cancellations-list" class="space-y-4"></div>
        </div>

        <div id="content-bank" class="tab-content hidden">
            <div class="card p-8 max-w-2xl">
                <div class="space-y-4">
                    <input type="text" id="bank-name" placeholder="Account Name" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3">
                    <input type="text" id="bank-info" placeholder="Bank & Branch" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3">
                    <input type="text" id="bank-acc" placeholder="Account Number" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3">
                    <button onclick="saveBank()" class="w-full bg-cyan-500 text-black font-bold py-3 rounded-xl">Save</button>
                </div>
            </div>
        </div>
    </div>

    <div id="review-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-6 hidden z-50">
        <div class="glass w-full max-w-2xl rounded-3xl p-8 relative">
            <button onclick="closeModal()" class="absolute top-6 right-6">Close</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, updateDoc, setDoc, serverTimestamp, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        if (localStorage.getItem('isAdmin') !== 'true') window.location.href = 'index.html';

        const firebaseConfig = {
            apiKey: "AIzaSyCmtV4tRTpCCgFZIVxGsW2lLiExZsTIOR4",
            authDomain: "frtapp-ff79b.firebaseapp.com",
            projectId: "frtapp-ff79b",
            storageBucket: "frtapp-ff79b.firebasestorage.app",
            messagingSenderId: "1060214465512",
            appId: "1:1060214465512:ios:377eddb6c315792a43ba5d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        try { await signInAnonymously(auth); } catch(e) {}

        onSnapshot(collection(db, "users"), (snap) => {
            const allUsers = snap.docs.map(d => d.data());
            const total = allUsers.length;
            const active = allUsers.filter(u => u.subscriptionExpiry && u.subscriptionExpiry.toDate() > new Date()).length;
            const pending = allUsers.filter(u => u.paymentStatus === 'pending').length;
            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-active').innerText = active;
            document.getElementById('stat-pending').innerText = pending;
            document.getElementById('stat-revenue').innerText = `LKR ${active * 350}`;
        }, err => console.error(err));

        onSnapshot(query(collection(db, "users"), where("paymentStatus", "==", "pending")), (snap) => {
            const list = document.getElementById('approvals-list');
            list.innerHTML = snap.docs.map(d => {
                const u = d.data();
                return `<div class="card p-5 flex items-center justify-between">
                    <div><b>${u.name}</b><br><small>${u.mobile}</small></div>
                    <button onclick="reviewUser('${d.id}')" class="bg-cyan-500/20 text-cyan-400 px-4 py-2 rounded-xl">Review</button>
                </div>`;
            }).join('');
        });

        window.reviewUser = async (id) => {
            const u = (await getDoc(doc(db, "users", id))).data();
            const modalBody = document.getElementById('modal-body');
            modalBody.innerHTML = `
                <div class="text-center">
                    <img src="${u.profilePicture}" class="w-20 h-20 rounded-full mx-auto mb-4">
                    <h3>${u.name}</h3>
                </div>
                <img src="${u.paymentSlipUrl}" class="w-full max-h-[400px] object-contain my-6">
                <div class="flex space-x-4">
                    <button onclick="handleApproval('${id}', false)" class="flex-1 border border-red-500 text-red-500 py-4 rounded-xl">Reject</button>
                    <button onclick="handleApproval('${id}', true)" class="flex-1 bg-green-500 text-black py-4 rounded-xl">Approve</button>
                </div>
            `;
            document.getElementById('review-modal').classList.remove('hidden');
        };

        window.handleApproval = async (id, approved) => {
            closeModal();
            const expiry = new Date();
            expiry.setDate(expiry.getDate() + 30);
            const promo = Math.random().toString(36).substring(2, 8).toUpperCase();
            await updateDoc(doc(db, "users", id), {
                isAppUnlocked: approved,
                paymentStatus: approved ? 'approved' : 'rejected',
                subscriptionExpiry: approved ? expiry : null,
                promoCode: approved ? promo : '',
                isFirstLoginAfterApprove: approved
            });
            alert(approved ? "Approved!" : "Rejected.");
        };

        const bankSnap = await getDoc(doc(db, "settings", "bankDetails"));
        if(bankSnap.exists()) {
            const b = bankSnap.data();
            document.getElementById('bank-name').value = b.name || '';
            document.getElementById('bank-info').value = b.bank || '';
            document.getElementById('bank-acc').value = b.accountNumber || '';
        }

        window.saveBank = async () => {
            await setDoc(doc(db, "settings", "bankDetails"), {
                name: document.getElementById('bank-name').value,
                bank: document.getElementById('bank-info').value,
                accountNumber: document.getElementById('bank-acc').value,
                updatedAt: serverTimestamp()
            });
            alert("Saved!");
        };

        window.logout = () => { localStorage.clear(); window.location.href = 'index.html'; };
        window.closeModal = () => document.getElementById('review-modal').classList.add('hidden');
        window.showTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`content-${tab}`).classList.remove('hidden');
        };
        showTab('approvals');
    </script>
</body>
</html>
