<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Road Track - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0F2027; background: linear-gradient(to right, #2C5364, #203A43, #0F2027); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center p-6 py-12">
    <div class="glass w-full max-w-lg p-10 rounded-3xl shadow-2xl text-white">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold mb-2 text-cyan-400">Join FRT</h1>
            <p class="text-gray-400 text-sm">Secure Registration Portal</p>
        </div>

        <div class="space-y-5">
            <div class="flex flex-col items-center mb-6">
                <div class="w-24 h-24 rounded-full border-2 border-cyan-400/30 overflow-hidden bg-white/5 relative group cursor-pointer" onclick="document.getElementById('profile-input').click()">
                    <img id="profile-preview" class="w-full h-full object-cover hidden">
                    <div id="profile-placeholder" class="absolute inset-0 flex items-center justify-center text-cyan-400">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
                    </div>
                </div>
                <input type="file" id="profile-input" class="hidden" accept="image/*">
            </div>

            <div>
                <label class="block text-xs font-bold mb-1 text-cyan-400/80">FULL NAME</label>
                <input type="text" id="reg-name" placeholder="John Doe" class="w-full bg-white/10 rounded-xl px-4 py-3 outline-none border border-white/10 focus:border-cyan-400">
            </div>

            <div>
                <label class="block text-xs font-bold mb-1 text-cyan-400/80">MOBILE NUMBER</label>
                <input type="text" id="reg-mobile" placeholder="077xxxxxxx" class="w-full bg-white/10 rounded-xl px-4 py-3 outline-none border border-white/10 focus:border-cyan-400">
            </div>

            <div>
                <label class="block text-xs font-bold mb-1 text-cyan-400/80">PASSWORD</label>
                <input type="password" id="reg-password" placeholder="••••••••" class="w-full bg-white/10 rounded-xl px-4 py-3 outline-none border border-white/10 focus:border-cyan-400">
            </div>

            <div class="flex items-start mt-4">
                <input type="checkbox" id="privacy-check" class="mt-1">
                <label class="ml-2 text-sm text-gray-400">Accept Privacy Policy</label>
            </div>
            
            <button id="btn-register" class="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-4 rounded-2xl transition-all h-14 flex items-center justify-center">
                <span id="reg-text">Create Account</span>
                <div id="reg-loader" class="hidden animate-spin rounded-full h-6 w-6 border-2 border-white/30 border-t-white"></div>
            </button>
        </div>

        <div id="error-toast" class="hidden mt-4 p-3 bg-red-500/20 border border-red-500 text-red-200 text-xs rounded-lg text-center"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCmtV4tRTpCCgFZIVxGsW2lLiExZsTIOR4",
            authDomain: "frtapp-ff79b.firebaseapp.com",
            projectId: "frtapp-ff79b",
            storageBucket: "frtapp-ff79b.firebasestorage.app",
            messagingSenderId: "1060214465512",
            appId: "1:1060214465512:ios:377eddb6c315792a43ba5d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const btnReg = document.getElementById('btn-register');
        const profileInput = document.getElementById('profile-input');
        const profilePreview = document.getElementById('profile-preview');
        const profilePlaceholder = document.getElementById('profile-placeholder');
        const errorToast = document.getElementById('error-toast');

        profileInput.onchange = e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = event => {
                    profilePreview.src = event.target.result;
                    profilePreview.classList.remove('hidden');
                    profilePlaceholder.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        btnReg.onclick = async () => {
            const name = document.getElementById('reg-name').value.trim();
            const mobile = document.getElementById('reg-mobile').value.trim();
            const password = document.getElementById('reg-password').value.trim();
            const privacyChecked = document.getElementById('privacy-check').checked;
            const file = profileInput.files[0];

            if (!name || !mobile || !password || !file) return showErr("Fill all fields and photo");
            if (!privacyChecked) return showErr("Accept Privacy Policy");

            toggleLoad(true);

            try {
                try {
                    await signInAnonymously(auth);
                } catch(e) { console.error("Auth:", e); }

                const existing = await getDoc(doc(db, "users", mobile));
                if (existing.exists()) return showErr("Already registered");

                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', 'ml_default');
                
                const cloudResp = await fetch('https://api.cloudinary.com/v1_1/dz86er6fe/image/upload', {
                    method: 'POST',
                    body: formData
                });
                const cloudData = await cloudResp.json();
                if (!cloudData.secure_url) throw new Error("Cloudinary Error: " + (cloudData.error?.message || "Unknown"));

                await setDoc(doc(db, "users", mobile), {
                    name,
                    mobile,
                    password,
                    profilePicture: cloudData.secure_url,
                    timestamp: serverTimestamp(),
                    isAppUnlocked: false,
                    paymentStatus: 'pending_payment',
                    generatedPromoCode: '',
                    isPromoCodeUsed: false,
                    isFirstLoginAfterApprove: false
                });

                localStorage.setItem('userId', mobile);
                window.location.href = 'dashboard.html';

            } catch (e) {
                showErr("Error: " + (e.code || e.message));
                console.error(e);
            } finally {
                toggleLoad(false);
            }
        };

        function showErr(msg) {
            errorToast.innerText = msg;
            errorToast.classList.remove('hidden');
            setTimeout(() => errorToast.classList.add('hidden'), 5000);
        }

        function toggleLoad(isLoading) {
            document.getElementById('reg-text').classList.toggle('hidden', isLoading);
            document.getElementById('reg-loader').classList.toggle('hidden', !isLoading);
            btnReg.disabled = isLoading;
        }
    </script>
</body>
</html>
