<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Road Track - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0F2027; background: linear-gradient(to right, #2C5364, #203A43, #0F2027); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center p-6 py-12">
    <div class="glass w-full max-w-lg p-10 rounded-3xl shadow-2xl text-white">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center text-cyan-400/50 hover:text-cyan-400 text-xs font-bold uppercase tracking-widest mb-6 transition-all">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                Back to Home
            </a>
            <h1 class="text-3xl font-bold mb-2 text-cyan-400">Join FRT</h1>
            <p class="text-gray-400 text-sm">Secure Registration Portal</p>
        </div>

        <div class="space-y-5">
            <div class="flex flex-col items-center mb-6">
                <div class="w-24 h-24 rounded-full border-2 border-cyan-400/30 overflow-hidden bg-white/5 relative group cursor-pointer" onclick="document.getElementById('profile-input').click()">
                    <img id="profile-preview" class="w-full h-full object-cover hidden">
                    <div id="profile-placeholder" class="absolute inset-0 flex items-center justify-center text-cyan-400">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
                    </div>
                </div>
                <input type="file" id="profile-input" class="hidden" accept="image/*">
            </div>

            <div>
                <label class="block text-xs font-bold mb-1 text-cyan-400/80">FULL NAME</label>
                <input type="text" id="reg-name" placeholder="John Doe" class="w-full bg-white/10 rounded-xl px-4 py-3 outline-none border border-white/10 focus:border-cyan-400">
            </div>

            <div>
                <label class="block text-xs font-bold mb-1 text-cyan-400/80">MOBILE NUMBER</label>
                <input type="text" id="reg-mobile" placeholder="077xxxxxxx" class="w-full bg-white/10 rounded-xl px-4 py-3 outline-none border border-white/10 focus:border-cyan-400">
            </div>

            <div class="relative">
                <label class="block text-xs font-bold mb-1 text-cyan-400/80 uppercase tracking-wider">PASSWORD</label>
                <div class="relative">
                    <input type="password" id="reg-password" placeholder="••••••••" class="w-full bg-white/10 rounded-xl px-4 py-3 outline-none border border-white/10 focus:border-cyan-400 text-white placeholder:text-gray-600 transition-all pr-12">
                    <button type="button" onclick="togglePassword('reg-password', this)" class="absolute right-3 top-1/2 -translate-y-1/2 p-1 text-gray-500 hover:text-cyan-400 transition-colors">
                        <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path id="eye-open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path id="eye-open-outer" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            <path id="eye-closed" class="hidden" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L5.146 5.146m9.032 9.032L18.854 18.854" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="p-4 bg-yellow-500/10 border border-yellow-500/30 rounded-2xl">
                <label class="block text-xs font-bold mb-2 text-yellow-400">DO YOU HAVE FREE PROMO CODE?</label>
                <input type="text" id="reg-promo" placeholder="ENTER CODE HERE" class="w-full bg-white/5 rounded-xl px-4 py-3 outline-none border border-yellow-500/20 focus:border-yellow-400 text-yellow-100 placeholder:text-yellow-900/50 font-mono tracking-widest text-center">
                <p class="text-[10px] text-yellow-500/60 mt-2 text-center">Use it here to activate your free account valid for 1 month</p>
            </div>

            <div class="flex items-start mt-4">
                <input type="checkbox" id="privacy-check" class="mt-1">
                <label class="ml-2 text-sm text-gray-400">Accept Privacy Policy</label>
            </div>
            
            <button id="btn-register" class="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-4 rounded-2xl transition-all h-14 flex items-center justify-center">
                <span id="reg-text">Create Account</span>
                <div id="reg-loader" class="hidden animate-spin rounded-full h-6 w-6 border-2 border-white/30 border-t-white"></div>
            </button>
        </div>

        <div id="error-toast" class="hidden mt-4 p-3 bg-red-500/20 border border-red-500 text-red-200 text-xs rounded-lg text-center"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, serverTimestamp, query, collection, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCmtV4tRTpCCgFZIVxGsW2lLiExZsTIOR4",
            authDomain: "frtapp-ff79b.firebaseapp.com",
            projectId: "frtapp-ff79b",
            storageBucket: "frtapp-ff79b.firebasestorage.app",
            messagingSenderId: "1060214465512",
            appId: "1:1060214465512:ios:377eddb6c315792a43ba5d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const btnReg = document.getElementById('btn-register');
        const profileInput = document.getElementById('profile-input');
        const profilePreview = document.getElementById('profile-preview');
        const profilePlaceholder = document.getElementById('profile-placeholder');
        const errorToast = document.getElementById('error-toast');

        profileInput.onchange = e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = event => {
                    profilePreview.src = event.target.result;
                    profilePreview.classList.remove('hidden');
                    profilePlaceholder.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        btnReg.onclick = async () => {
            const name = document.getElementById('reg-name').value.trim();
            const mobile = document.getElementById('reg-mobile').value.trim();
            const password = document.getElementById('reg-password').value.trim();
            const privacyChecked = document.getElementById('privacy-check').checked;
            const file = profileInput.files[0];

            if (!name || !mobile || !password || !file) return showErr("Fill all fields and photo");
            if (!privacyChecked) return showErr("Accept Privacy Policy");

            toggleLoad(true);

            try {
                try {
                    await signInAnonymously(auth);
                } catch(e) { console.error("Auth:", e); }

                const existing = await getDoc(doc(db, "users", mobile));
                if (existing.exists()) return showErr("Already registered");

                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', 'ml_default');
                
                const cloudResp = await fetch('https://api.cloudinary.com/v1_1/dz86er6fe/image/upload', {
                    method: 'POST',
                    body: formData
                });
                const cloudData = await cloudResp.json();
                if (!cloudData.secure_url) throw new Error("Cloudinary Error: " + (cloudData.error?.message || "Unknown"));

                const promoCode = document.getElementById('reg-promo').value.trim().toUpperCase();
                let isUnlocked = false;
                let expiry = null;

                if (promoCode) {
                    const q = query(collection(db, "users"), where("promoCode", "==", promoCode));
                    const qSnap = await getDocs(q);
                    
                    if (qSnap.empty) {
                        return showErr("Invalid Promo Code");
                    }
                    
                    const promoUserDoc = qSnap.docs[0];
                    const promoData = promoUserDoc.data();
                    
                    if (promoData.isPromoCodeUsed) {
                        return showErr("This Promo Code has already been used");
                    }

                    // CHECK IF OWNER IS EXPIRED
                    if (promoData.subscriptionExpiry) {
                        const ownerExpiry = promoData.subscriptionExpiry.toDate();
                        if (new Date() > ownerExpiry) {
                            return showErr("The owner of this code has an expired subscription. Code is invalid.");
                        }
                    } else if (!promoData.isAppUnlocked) {
                        return showErr("The owner of this code is not currently active.");
                    }
                    
                    // Valid!
                    isUnlocked = true;
                    expiry = new Date();
                    expiry.setDate(expiry.getDate() + 30); // Consistent 30 days
                    
                    // Mark as used
                    await updateDoc(doc(db, "users", promoUserDoc.id), {
                        isPromoCodeUsed: true
                    });
                }

                await setDoc(doc(db, "users", mobile), {
                    name,
                    mobile,
                    password,
                    profilePicture: cloudData.secure_url,
                    timestamp: serverTimestamp(),
                    isAppUnlocked: isUnlocked,
                    paymentStatus: isUnlocked ? 'approved' : 'pending_payment',
                    promoCode: '', // This user will get their own code later after manual approval if they pay? Or maybe auto-gen?
                    isPromoCodeUsed: false,
                    isFirstLoginAfterApprove: isUnlocked,
                    subscriptionExpiry: expiry
                });

                localStorage.setItem('userId', mobile);
                window.location.href = 'dashboard.html';

            } catch (e) {
                showErr("Error: " + (e.code || e.message));
                console.error(e);
            } finally {
                toggleLoad(false);
            }
        };

        function showErr(msg) {
            errorToast.innerText = msg;
            errorToast.classList.remove('hidden');
            setTimeout(() => errorToast.classList.add('hidden'), 5000);
        }

        function toggleLoad(isLoading) {
            document.getElementById('reg-text').classList.toggle('hidden', isLoading);
            document.getElementById('reg-loader').classList.toggle('hidden', !isLoading);
            btnReg.disabled = isLoading;
        }

        window.togglePassword = (id, btn) => {
            const input = document.getElementById(id);
            const eyeOpen = btn.querySelector('#eye-open');
            const eyeOpenOuter = btn.querySelector('#eye-open-outer');
            const eyeClosed = btn.querySelector('#eye-closed');
            
            if (input.type === 'password') {
                input.type = 'text';
                eyeOpen.classList.add('hidden');
                eyeOpenOuter.classList.add('hidden');
                eyeClosed.classList.remove('hidden');
            } else {
                input.type = 'password';
                eyeOpen.classList.remove('hidden');
                eyeOpenOuter.classList.remove('hidden');
                eyeClosed.classList.add('hidden');
            }
        };
    </script>
</body>
</html>
