<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Road Track - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0F2027; background: linear-gradient(to right, #2C5364, #203A43, #0F2027); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center p-6 py-12">
    <div class="glass w-full max-w-md p-10 rounded-3xl shadow-2xl text-white">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center text-cyan-400/50 hover:text-cyan-400 text-xs font-bold uppercase tracking-widest mb-6 transition-all">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                Back to Home
            </a>
            <h1 class="text-3xl font-bold mb-2 text-cyan-400">Welcome Back</h1>
            <p class="text-gray-400 text-sm">Secure Login Portal</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-xs font-bold mb-1 text-cyan-400/80 uppercase tracking-wider">Mobile Number</label>
                <input type="text" id="log-mobile" placeholder="077xxxxxxx" class="w-full bg-white/10 rounded-xl px-4 py-3 outline-none border border-white/10 focus:border-cyan-400 text-white placeholder:text-gray-600 transition-all">
            </div>

            <div>
                <label class="block text-xs font-bold mb-1 text-cyan-400/80 uppercase tracking-wider">Password</label>
                <input type="password" id="log-password" placeholder="••••••••" class="w-full bg-white/10 rounded-xl px-4 py-3 outline-none border border-white/10 focus:border-cyan-400 text-white placeholder:text-gray-600 transition-all">
            </div>

            <button id="btn-login" class="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-4 rounded-2xl transition-all h-14 flex items-center justify-center shadow-lg shadow-cyan-500/20">
                <span id="log-text">Login Now</span>
                <div id="log-loader" class="hidden animate-spin rounded-full h-6 w-6 border-2 border-white/30 border-t-white"></div>
            </button>
            <p class="text-center text-sm text-gray-500 mt-4">Don't have an account? <a href="register.html" class="text-cyan-400 font-semibold hover:underline">Register</a></p>
        </div>

        <div id="error-toast" class="hidden mt-6 p-3 bg-red-500/20 border border-red-500 text-red-200 text-xs rounded-lg text-center"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCmtV4tRTpCCgFZIVxGsW2lLiExZsTIOR4",
            authDomain: "frtapp-ff79b.firebaseapp.com",
            projectId: "frtapp-ff79b",
            storageBucket: "frtapp-ff79b.firebasestorage.app",
            messagingSenderId: "1060214465512",
            appId: "1:1060214465512:ios:377eddb6c315792a43ba5d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const btnLogin = document.getElementById('btn-login');
        const errorToast = document.getElementById('error-toast');

        btnLogin.onclick = async () => {
            const mobile = document.getElementById('log-mobile').value.trim();
            const password = document.getElementById('log-password').value.trim();

            if (!mobile || !password) return showErr("Please enter credentials");

            toggleLoad(true);

            try {
                // Hardcoded Admin
                if (mobile === '0771246939' && password === 'Admin123@j') {
                    localStorage.setItem('isAdmin', 'true');
                    window.location.href = 'admin.html';
                    return;
                }

                await signInAnonymously(auth);
                const userDoc = await getDoc(doc(db, "users", mobile));
                
                if (userDoc.exists()) {
                    if (userDoc.data().password === password) {
                        localStorage.setItem('userId', mobile);
                        window.location.href = 'dashboard.html';
                    } else {
                        showErr("Incorrect password");
                    }
                } else {
                    showErr("User not found");
                }

            } catch (e) {
                showErr("Error: " + (e.code || e.message));
                console.error(e);
            } finally {
                toggleLoad(false);
            }
        };

        function showErr(msg) {
            errorToast.innerText = msg;
            errorToast.classList.remove('hidden');
            setTimeout(() => errorToast.classList.add('hidden'), 5000);
        }

        function toggleLoad(isLoading) {
            document.getElementById('log-text').classList.toggle('hidden', isLoading);
            document.getElementById('log-loader').classList.toggle('hidden', !isLoading);
            btnLogin.disabled = isLoading;
        }
    </script>
</body>
</html>
